<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Scheduled deliveries</title>
<style>
  :root{--green:#0a7d3c;--green-d:#075c2c;--ink:#10241c;--mute:#6a7a70;--line:#e6ece8;--bg:#f5f7f5;--card:#fff;--amber:#b8860b;--blue:#1f6feb}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
  a{color:inherit;text-decoration:none}
  .top{background:var(--green-d);color:#fff;display:flex;align-items:center;gap:12px;padding:14px 18px;position:sticky;top:0;z-index:5}
  .top .bk{font-size:20px}.top h1{font-size:18px;font-weight:700}
  .wrap{max-width:820px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
  h3{font-size:15px;font-weight:700;margin-bottom:12px}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--mute);margin:9px 0 4px}
  input,select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff}
  .rowf{display:flex;gap:10px}.rowf>*{flex:1}
  .btn{margin-top:12px;width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:700;font-size:15px;cursor:pointer}
  .btn:hover{background:var(--green-d)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .day{margin:18px 0 8px;font-size:13px;font-weight:700;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
  .o{display:flex;align-items:center;gap:12px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:8px}
  .o .tm{text-align:center;min-width:64px}
  .o .tm .t{font-weight:800;font-size:15px}.o .tm .cd{font-size:11px;color:var(--blue);font-weight:700}
  .o .mid{flex:1;min-width:0}
  .o .mid .n{font-weight:700}.o .mid .s{font-size:12.5px;color:var(--mute)}
  .stage{font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px;white-space:nowrap}
  .st-Scheduled{background:#eef3ef;color:var(--green-d)}
  .st-Preparing{background:#fff4d6;color:var(--amber)}
  .st-Ready{background:#ffe9d6;color:#b85c00}
  .st-Out{background:#e1ecff;color:var(--blue)}
  .empty{color:var(--mute);font-size:14px;padding:8px 0}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111b21;color:#fff;padding:11px 16px;border-radius:10px;font-size:13.5px;opacity:0;transition:.2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1}
  .hint{font-size:12.5px;color:var(--mute);margin-top:8px}
</style>
</head>
<body>
<div class="top"><a class="bk" href="/panel">‹</a><h1>Scheduled deliveries</h1></div>

<div class="wrap">
  <div class="card">
    <h3>Schedule an order</h3>
    <label>Order</label>
    <select id="ordSel"><option value="">Loading orders…</option></select>
    <label>When</label>
    <div class="chips" id="whenChips">
      <span class="chip" data-q="later">Today, later</span>
      <span class="chip" data-q="tomorrow">Tomorrow</span>
      <span class="chip on" data-q="custom">Custom date &amp; time</span>
    </div>
    <div class="rowf" id="customRow" style="margin-top:8px">
      <div><label>Date</label><input id="sDate" type="date"></div>
      <div><label>Time</label><input id="sTime" type="time"></div>
    </div>
    <button class="btn" onclick="schedule()">Schedule delivery</button>
    <div class="hint">You'll get WhatsApp reminders 2 hours before (prepare), 30 minutes before (assign a rider), and at delivery time (dispatch).</div>
  </div>

  <div class="card">
    <h3>Upcoming queue</h3>
    <div id="queue"><div class="empty">Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  var $=function(i){return document.getElementById(i);},QUEUE=[];
  function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}
  function esc(s){return (s||'').replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];});}
  function ugx(n){return 'UGX '+Math.round(n||0).toLocaleString();}

  // when chips
  var whenMode='custom';
  $('whenChips').addEventListener('click',function(e){
    var c=e.target.closest('.chip');if(!c)return;
    [].forEach.call(this.children,function(x){x.classList.remove('on');});
    c.classList.add('on');whenMode=c.dataset.q;
    $('customRow').style.display=whenMode==='custom'?'flex':'none';
  });

  function pad(n){return (n<10?'0':'')+n;}
  function whenISO(){
    var d=new Date();
    if(whenMode==='later'){ d.setHours(d.getHours()+3,0,0,0); return d.toISOString(); }
    if(whenMode==='tomorrow'){ d.setDate(d.getDate()+1); d.setHours(10,0,0,0); return d.toISOString(); }
    // custom
    if(!$('sDate').value||!$('sTime').value)return null;
    return new Date($('sDate').value+'T'+$('sTime').value).toISOString();
  }

  async function load(){
    try{
      var r=await fetch('/papi/scheduled',{cache:'no-store'});var d=await r.json();if(!d.ok)return;
      // order picker
      var sel=$('ordSel');
      sel.innerHTML='<option value="">Select an order…</option>'+d.candidates.map(function(o){
        return '<option value="'+o.id+'">#'+esc(o.order_no)+' · '+esc(o.customer||'customer')+' · '+ugx(o.total)+'</option>';
      }).join('');
      if(!d.candidates.length)sel.innerHTML='<option value="">No un-scheduled orders</option>';
      // queue grouped by day
      QUEUE=d.queue;renderQueue();
    }catch(e){}
  }

  function renderQueue(){
    var box=$('queue');
    if(!QUEUE.length){box.innerHTML='<div class="empty">No scheduled deliveries yet.</div>';return;}
    var groups={},order=[];
    QUEUE.forEach(function(o){
      var day=new Date(o.when).toLocaleDateString([], {weekday:'long',month:'short',day:'numeric'});
      if(!groups[day]){groups[day]=[];order.push(day);}
      groups[day].push(o);
    });
    box.innerHTML=order.map(function(day){
      return '<div class="day">'+day+'</div>'+groups[day].map(row).join('');
    }).join('');
  }

  function row(o){
    var dt=new Date(o.when);
    var t=dt.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
    var stKey=(o.stage||'Scheduled').split(' ')[0];
    return '<div class="o" data-when="'+o.when+'">'+
      '<div class="tm"><div class="t">'+t+'</div><div class="cd" data-cd>—</div></div>'+
      '<div class="mid"><div class="n">#'+esc(o.order_no)+' · '+esc(o.customer||'customer')+'</div>'+
        '<div class="s">'+esc(o.location||'')+' · '+ugx(o.total)+'</div></div>'+
      '<span class="stage st-'+stKey+'">'+esc(o.stage||'Scheduled')+'</span></div>';
  }

  function ticks(){
    document.querySelectorAll('.o[data-when]').forEach(function(el){
      var ms=new Date(el.dataset.when)-new Date(),cd=el.querySelector('[data-cd]');
      if(ms<=0){cd.textContent='now';return;}
      var m=Math.floor(ms/60000),h=Math.floor(m/60),dys=Math.floor(h/24);
      cd.textContent = dys>0?('in '+dys+'d') : h>0?('in '+h+'h '+(m%60)+'m') : ('in '+m+'m');
    });
  }
  setInterval(ticks,1000*30);

  async function schedule(){
    var id=$('ordSel').value;if(!id){toast('Pick an order first');return;}
    var iso=whenISO();if(!iso){toast('Choose a date and time');return;}
    try{
      var r=await fetch('/papi/schedule-order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({order_id:+id,mode:'schedule',when:iso})});
      var d=await r.json();
      if(d&&d.ok){toast('Delivery scheduled');load();setTimeout(ticks,300);}
      else if(d&&d.error==='past'){toast('Pick a time in the future');}
      else{toast('Could not schedule');}
    }catch(e){toast('Network error');}
  }

  load();setTimeout(ticks,400);
</script>
</body>
</html>
