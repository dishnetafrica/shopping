<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Shop</title>
<style>
  :root{--green:#0C831F;--green-d:#0A6E1A;--ink:#1F1F1F;--muted:#7A7A7A;--line:#ECECEC;--bg:#FFFFFF;--card:#fff;--tile:#EEF2FB;--tileicon:#2E3340;--red:#B4232A;--amber:#C2700A}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:88px}
  a{color:inherit}
  .top{position:sticky;top:0;z-index:30;background:#fff;color:var(--ink);padding:11px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
  .top .lg{width:34px;height:34px;border-radius:9px;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:800;flex:none}
  .top b{font-size:15px;line-height:1.1;display:block}.top .sub{font-size:11px;color:var(--muted)}
  .searchwrap{position:sticky;top:56px;z-index:25;background:var(--bg);padding:10px 12px 8px}
  .delv{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#F1F8F3;border-bottom:1px solid var(--line);font-size:13px;color:var(--ink);cursor:pointer}
  .delv .ico{font-size:15px;flex:none}
  .delv .txt{flex:1;font-weight:600;line-height:1.25}
  .delv .chg{color:var(--green-d);font-weight:700;font-size:12px;flex:none}
  .delv .pick{display:flex;gap:6px;flex:none}
  .delv .pick button{border:1px solid var(--green);background:#fff;color:var(--green-d);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
  .delv.out{background:#FFF4EE}
  .locbtn{width:100%;border:1px solid var(--green);background:#fff;color:var(--green-d);border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer}
  .locbtn:disabled{opacity:.6}
  .locmsg{font-size:12.5px;margin-top:6px;color:var(--muted)}
  .locmsg.ok{color:var(--green-d);font-weight:600}
  .locmsg a{color:var(--green-d);font-weight:700}
  .search{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:15px;background:#F4F4F6;color:var(--ink);outline:none}
  .search:focus{border-color:var(--green)}
  .section-title{font-size:15px;font-weight:800;padding:6px 14px 8px;color:var(--ink)}
  .meta{padding:0 14px 8px;font-size:12px;color:var(--muted)}
  .backbar{display:flex;align-items:center;gap:10px;padding:8px 14px 4px}
  .backbar button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-weight:700;font-size:13px}
  .backbar b{font-size:15px}
  /* category tiles */
  .catgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:0 12px}
  @media(min-width:520px){.catgrid{grid-template-columns:repeat(4,1fr)}}
  .cat{border:0;background:transparent;padding:0;cursor:pointer;text-align:center}
  .cat .ci{background:var(--tile);border-radius:16px;overflow:hidden;border:0;aspect-ratio:1/1;display:grid;place-items:center}
  .cat .ci img{width:100%;height:100%;object-fit:cover}
  .cat .ci .ph{font-size:30px}
  .cat .nm{font-size:11.5px;font-weight:600;margin-top:6px;line-height:1.2}
  /* product cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .pc{background:var(--card);border:1px solid var(--line);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
  .pc .img{aspect-ratio:1/1;background:#fff;border-bottom:1px solid var(--line);display:grid;place-items:center;overflow:hidden;cursor:pointer}
  .pc .img img{width:100%;height:100%;object-fit:contain;padding:9px}.pc .img .ph{font-size:28px;color:#B9CDBE}
  .pc .bd{padding:8px 9px 10px;display:flex;flex-direction:column;gap:4px;flex:1}
  .pc .nm{font-size:12.5px;font-weight:600;line-height:1.25;min-height:31px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pc .pr{font-size:14px;font-weight:800;color:var(--ink)}
  .pc .add{margin-top:auto;border:1px solid var(--green);background:#fff;color:var(--green);border-radius:9px;padding:8px;font-size:13px;font-weight:800}
  .pc .stp{margin-top:auto;display:flex;align-items:center;justify-content:space-between;border:1px solid var(--green);border-radius:9px;overflow:hidden}
  .pc .stp button{border:0;background:var(--green);color:#fff;width:34px;height:34px;font-size:18px;font-weight:800}
  .pc .stp span{font-weight:800;font-size:14px}
  .pc .vchips{display:flex;gap:5px;flex-wrap:wrap;margin:1px 0 3px}
  .pc .vchip{border:1.4px solid var(--line);background:#fff;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
  .pc .vchip.on{border-color:var(--green);background:#EAF7EE;color:var(--green)}
  .pc .unit{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:-2px}
  .pc .opts{position:absolute;top:6px;left:6px;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:999px;font-size:9.5px;font-weight:800;color:#7A1F1F;padding:2px 7px;z-index:2}
.pc .vsize{font-size:11px;color:var(--muted);font-weight:700;margin-top:-1px}
.pc .add.opt{display:flex;flex-direction:column;align-items:center;line-height:1.05;gap:1px;padding:6px}
.pc .add.opt span{font-size:9.5px;font-weight:800;color:var(--green);opacity:.85}
.vlist{display:flex;flex-direction:column;gap:9px;margin-bottom:8px}
.vrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:12px;padding:9px 11px}
.vth{width:54px;height:54px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;flex:none}
.vth img{width:100%;height:100%;object-fit:contain;padding:4px}
.vth .cicon,.vth .ph,.vth span{font-size:22px;color:#B9CDBE}
.vmeta{flex:1}
.vsz{font-weight:700;font-size:14px}
.vpr{font-weight:800;font-size:14px;margin-top:1px}
.vunit{font-weight:600;font-size:11px;color:var(--muted)}
.add.sm{border:1.4px solid var(--green);background:#fff;color:var(--green);border-radius:9px;padding:7px 18px;font-size:13px;font-weight:800;flex:none}
.stp.sm{display:flex;align-items:center;border:1.4px solid var(--green);border-radius:9px;overflow:hidden;flex:none}
.stp.sm button{border:0;background:var(--green);color:#fff;width:30px;height:30px;font-size:16px;font-weight:800}
.stp.sm span{font-weight:800;font-size:13px;min-width:28px;text-align:center}
  .empty{padding:42px 16px;text-align:center;color:var(--muted)}
  .cartbar{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--green);color:#fff;display:none;align-items:center;justify-content:space-between;padding:13px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.15)}
  .cartbar.show{display:flex}
  .cartbar .l{font-size:13px;opacity:.9}.cartbar .n{font-size:16px;font-weight:800}
  .cartbar button{border:0;background:#fff;color:var(--green-d);font-weight:800;border-radius:10px;padding:10px 18px;font-size:14px}
  .sheet{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.4);display:none}.sheet.show{display:block}
  .sheetcard{position:absolute;left:0;right:0;bottom:0;max-height:88vh;background:#fff;border-radius:18px 18px 0 0;display:flex;flex-direction:column}
  .sheethd{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:1px solid var(--line)}
  .sheethd b{font-size:16px}.sheethd .x{border:0;background:#F2F6F2;width:32px;height:32px;border-radius:50%;font-size:18px}
  .sheetbody{overflow-y:auto;padding:8px 16px;flex:1}
  .ci2{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid #EEF2EE}
  .ci2 .nm{flex:1;font-size:13.5px;font-weight:600}.ci2 .pr{font-size:12px;color:var(--muted)}
  .ci2 .stp{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .ci2 .stp button{border:0;background:#F2F6F2;width:30px;height:30px;font-size:16px;font-weight:800}
  .ci2 .stp span{width:30px;text-align:center;font-weight:700}
  .field{margin:9px 0}.field label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:15px;background:#fff;color:var(--ink);outline:none}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green)}
  .note{font-size:12px;color:var(--muted);background:#F4F7F4;border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin:8px 0}
  .totrow{display:flex;justify-content:space-between;font-size:14px;padding:5px 0}
  .totrow.g{font-weight:800;font-size:17px;border-top:2px solid var(--ink);margin-top:6px;padding-top:9px}
  .place{width:100%;border:0;background:var(--green);color:#fff;font-weight:800;border-radius:12px;padding:15px;font-size:16px;margin:12px 0 6px}
  .place:disabled{opacity:.6}
  .ok{padding:46px 22px;text-align:center}.ok .big{font-size:46px}.ok h2{margin:12px 0 4px;color:var(--green-d)}.ok p{color:var(--muted);font-size:14px}
  .ok .ono{display:inline-block;margin-top:10px;background:#EAF3EC;color:var(--green-d);font-weight:800;border-radius:10px;padding:9px 16px;font-size:18px}
  #footer{text-align:center;padding:26px 16px 12px;color:var(--muted);font-size:12px;line-height:1.7}
  #footer a{color:var(--muted);text-decoration:underline}
  .cicon{display:block}
  .pc .img{position:relative}
  .pc .img img{position:absolute;inset:0}
  .pc .img .cicon{width:52px;height:52px}
  .cat .ci{position:relative}
  .cat .ci .cicon{width:58%;height:58%}
</style>
</head>
<body>

<a class="top" href="#" style="text-decoration:none">
  <div class="lg">SH</div>
  <div><b>Shop</b><span class="sub">Browse &amp; order on WhatsApp delivery</span></div>
</a>

<div class="delv" id="delvBar" onclick="askLocation()"><span class="ico">📍</span><span class="txt">Set your location for delivery time</span><span class="chg">›</span></div>

<div class="searchwrap"><input id="q" class="search" placeholder="Search products… (e.g. sugar, atta, oil)"></div>
<div id="content"><div class="empty">Loading products…</div></div>

<div id="footer"><span id="footName">Shop</span><br>
<a id="staffLink" href="#">Staff login</a></div>

<div class="cartbar" id="cartbar">
  <div><div class="l" id="cartCount">0 items</div><div class="n" id="cartTotal">0</div></div>
  <button onclick="openCart()">View cart →</button>
</div>

<div class="sheet" id="sheet">
  <div class="sheetcard">
    <div class="sheethd"><b id="sheetTitle">Your cart</b><button class="x" onclick="closeSheet()">×</button></div>
    <div class="sheetbody" id="sheetBody"></div>
  </div>
</div>

<script>
/* ====================== CONFIG (injected per shop by the server) ====================== */
window.SHOP = __SHOP_CONFIG__;
var SHOP = window.SHOP || {};
var CUR  = SHOP.currency || 'UGX';
var CATALOGUE_URL = SHOP.catalogueUrl || (location.pathname.replace(/\/+$/,'') + '/catalogue');
var SUBMIT_URL    = SHOP.orderUrl     || (location.pathname.replace(/\/+$/,'') + '/order');
var ADMIN_URL     = SHOP.panelUrl     || '/panel';
var WA_NUMBER     = String(SHOP.waNumber || '').replace(/[^0-9]/g,''); // shop's public WhatsApp (digits only)
/* ---- delivery time bands (overridden by the feed's settings when provided) ---- */
var DELIVERY = Object.assign({
  near_km:4,  near:'Delivery in ~30 min',
  mid_km:10,  mid:'Delivery in ~1–2 hrs',
  max_km:25,  far:'Same-day delivery',
  out:'Message us to check delivery to your area'
}, SHOP.delivery || {});
var BRANCHES = (SHOP.branches && SHOP.branches.length)
  ? SHOP.branches.map(function(b){return {name:String(b.name||'Store'),lat:Number(b.lat),lng:Number(b.lng)};}).filter(function(b){return isFinite(b.lat)&&isFinite(b.lng);})
  : [{name:(SHOP.city||'Our store'), lat:0.3476, lng:32.5825}];
var DELV = null;                               // current detected delivery state
var GEO  = null;                               // captured delivery GPS pin {lat,lng}
/* ===================================================================================== */

var $=function(id){return document.getElementById(id);};
var PRODUCTS=[], CATS=[], CART={}, CAT='all', Q='', CAT_IMG={}, THALI=null, VSEL={}, GROUPS={};
var TINTS=['#EEF2FB','#FDEEF3','#EAF6EF','#FFF4E6','#F1EEFB','#E9F5F9','#FCEEEA','#EEF7F0'];
var STORE_KEY='cb_cart_'+(SHOP.slug||'shop'), DELV_KEY='cb_delv_'+(SHOP.slug||'shop');
var CUST_KEY='cb_cust_'+(SHOP.slug||'shop'), LAST_KEY='cb_last_'+(SHOP.slug||'shop');
var CUST=null, LASTORDER=null;
var AUTH_KEY='cb_tok_'+(SHOP.slug||'shop'), AUTHTOK=null, MYORDERS=null;
function loadCust(){try{CUST=JSON.parse(localStorage.getItem(CUST_KEY)||'null');}catch(e){CUST=null;} try{LASTORDER=JSON.parse(localStorage.getItem(LAST_KEY)||'null');}catch(e){LASTORDER=null;} try{AUTHTOK=localStorage.getItem(AUTH_KEY)||null;}catch(e){AUTHTOK=null;} if(AUTHTOK)loadMyOrders();}
function saveCust(c){CUST=c;try{localStorage.setItem(CUST_KEY,JSON.stringify(c));}catch(e){}}
function saveLast(items){LASTORDER={items:items,at:Date.now()};try{localStorage.setItem(LAST_KEY,JSON.stringify(LASTORDER));}catch(e){}}
function forgetCust(){CUST=null;try{localStorage.removeItem(CUST_KEY);}catch(e){} render();}
function ugx(n){return CUR+' '+(Number(n)||0).toLocaleString('en-US');}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function jk(s){return JSON.stringify(String(s)).replace(/"/g,'&quot;');}
function num(v){return Number(String(v==null?'':v).replace(/[^0-9.]/g,''))||0;}
function qp(k){var m=location.search.match(new RegExp('[?&]'+k+'=([^&]*)'));return m?decodeURIComponent(m[1]):'';}

function mapProduct(row){
  var pn=String(row['Product Name']||''), v=String(row.Variant||'').trim();
  return {name:v?pn+' '+v:pn, brand:String(row.Brand||''), category:String(row.Category||'Other'),
    keywords:String(row.Keywords||''), price:num(row.Price_UGX),
    image:String(row.Image||row.Photo||row.Image_URL||row['Image URL']||'')};
}

async function load(){
  try{
    var r=await fetch(CATALOGUE_URL,{cache:'no-store'});
    var d=await r.json();
    PRODUCTS=(Array.isArray(d.products)?d.products:[]).map(mapProduct).filter(function(p){return p.name && p.price>0;});
    if(d.settings){var ph=String(d.settings.waNumber||d.settings.storePhone||'').replace(/[^0-9]/g,'');if(ph)WA_NUMBER=ph;
      if(d.settings.currency)CUR=String(d.settings.currency);
      if(d.settings.category_images)CAT_IMG=d.settings.category_images||{}; if(d.settings.thali)THALI=d.settings.thali;}
    if(Array.isArray(d.branches)&&d.branches.length){
      var bs=d.branches.map(function(b){return {name:String(b.name||b.title||'Branch'),lat:Number(b.lat),lng:Number(b.lng)};}).filter(function(b){return isFinite(b.lat)&&isFinite(b.lng);});
      if(bs.length)BRANCHES=bs;
    }
    if(d.settings&&d.settings.delivery){var dl=d.settings.delivery;
      ['near_km','mid_km','max_km'].forEach(function(k){if(dl[k]!=null&&isFinite(Number(dl[k])))DELIVERY[k]=Number(dl[k]);});
      ['near','mid','far','out'].forEach(function(k){if(dl[k]!=null)DELIVERY[k]=String(dl[k]);});
    }
    var map={};
    PRODUCTS.forEach(function(p){ var c=p.category||'Other'; if(!map[c])map[c]={name:c,img:'',count:0}; map[c].count++; if(!map[c].img&&p.image)map[c].img=p.image; });
    CATS=Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.count-a.count;});
    render();
  }catch(e){
    $('content').innerHTML='<div class="empty">Couldn’t load the catalogue.<br>Please try again shortly.</div>';
  }
}

function setCat(c){CAT=c;Q='';if($('q'))$('q').value='';render();window.scrollTo(0,0);}

/* ---------------- delivery location ---------------- */
function haversineKm(la1,lo1,la2,lo2){var R=6371,t=Math.PI/180,dLa=(la2-la1)*t,dLo=(lo2-lo1)*t;
  var s=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*t)*Math.cos(la2*t)*Math.sin(dLo/2)*Math.sin(dLo/2);
  return 2*R*Math.atan2(Math.sqrt(s),Math.sqrt(1-s));}
function nearestBranch(lat,lng){var best=null;BRANCHES.forEach(function(b){var km=haversineKm(lat,lng,Number(b.lat),Number(b.lng));if(best===null||km<best.km)best={branch:b,km:km};});return best;}
function etaLabel(km){if(km<=DELIVERY.near_km)return DELIVERY.near;if(km<=DELIVERY.mid_km)return DELIVERY.mid;if(km<=DELIVERY.max_km)return DELIVERY.far;return null;}
function setDelv(html,out){var el=$('delvBar');if(!el)return;el.className='delv'+(out?' out':'');el.innerHTML=html;}
function saveDelv(){try{localStorage.setItem(DELV_KEY,JSON.stringify(DELV));}catch(e){}}
function showDelv(){
  if(!DELV){setDelv('<span class="ico">📍</span><span class="txt">Set your location for delivery time</span><span class="chg">›</span>');return;}
  if(DELV.mode==='out'){setDelv('<span class="ico">⚠️</span><span class="txt">'+esc(DELIVERY.out)+'</span><span class="chg">Change</span>',true);return;}
  if(DELV.mode==='city'){setDelv('<span class="ico">🛵</span><span class="txt">Delivering to '+esc(DELV.branch.name)+'</span><span class="chg">Change</span>');return;}
  setDelv('<span class="ico">🛵</span><span class="txt">'+esc(DELV.label)+'</span><span class="chg">Change</span>');
}
function applyCoords(lat,lng){
  GEO={lat:+(+lat).toFixed(6),lng:+(+lng).toFixed(6)};
  var n=nearestBranch(lat,lng);
  if(!n){DELV={mode:'city',branch:BRANCHES[0]||{name:'your area'}};}
  else{var lab=etaLabel(n.km);
    if(lab===null)DELV={mode:'out',branch:n.branch,km:n.km};
    else DELV={mode:'eta',branch:n.branch,km:n.km,label:lab+' · '+n.branch.name};}
  saveDelv();showDelv();
}
function renderManual(){
  setDelv('<span class="ico">📍</span><span class="txt">Choose your area:</span><span class="pick">'+
    BRANCHES.map(function(b){return '<button onclick="event.stopPropagation();pickCity('+jk(b.name)+')">'+esc(b.name)+'</button>';}).join('')+'</span>');
}
function pickCity(name){var b=null;BRANCHES.forEach(function(x){if(x.name===name)b=x;});DELV={mode:'city',branch:b||{name:name}};saveDelv();showDelv();}
function askLocation(){
  if(!navigator.geolocation){renderManual();return;}
  setDelv('<span class="ico">📍</span><span class="txt">Detecting your location…</span>');
  navigator.geolocation.getCurrentPosition(
    function(p){applyCoords(p.coords.latitude,p.coords.longitude);},
    function(){renderManual();},
    {enableHighAccuracy:false,timeout:8000,maximumAge:600000}
  );
}
function restoreDelv(){try{var s=localStorage.getItem(DELV_KEY);if(s)DELV=JSON.parse(s);}catch(e){DELV=null;}showDelv();}

function catIcon(cat){
  var c=String(cat||'').toLowerCase();
  function has(){for(var i=0;i<arguments.length;i++){if(c.indexOf(arguments[i])>=0)return true;}return false;}
  var k='bag';
  if(has('kitchen','utensil','cookware','cutlery','crockery')) k='kitchen';
  else if(has('cosmet','beauty','makeup','make-up','perfume','fragrance','lipstick','nail')) k='cosmet';
  else if(has('soap','deterg','clean','wash','laundry')) k='soap';
  else if(has('oil','ghee')) k='oil';
  else if(has('tea','coffee')) k='tea';
  else if(has('spice','masala','seasoning','condiment')) k='spice';
  else if(has('station','pencil','book','paper','office')) k='pencil';
  else if(has('toy','kids','game','play')) k='toy';
  else if(has('diaper','baby','infant','toddler')) k='baby';
  else if(has('pad','sanitary','hygiene','feminine','napkin')) k='care';
  else if(has('med','pharma','drug','tablet','pill','health')) k='pill';
  else if(has('choc','candy','sweet','confection','toffee')) k='candy';
  else if(has('electron','gadget','battery','bulb','light','phone','charger','flash')) k='bulb';
  else if(has('plastic','container','bucket','box','storage')) k='bucket';
  else if(has('lock','hardware','tool','padlock','key')) k='lock';
  else if(has('cloth','apparel','garment','wear','shirt','fashion')) k='shirt';
  else if(has('wine','beer','alcohol','liquor','spirit','whisky','vodka','tobac','cigar')) k='wine';
  else if(has('drink','beverage','soda','juice','water','cola','soft','gas')) k='bottle';
  else if(has('fresh','veg','fruit','produce','salad','dairy','milk')) k='apple';
  else if(has('party','celebrat','decor','gift','festive')) k='gift';
  else if(has('household','home','house','furnish')) k='house';

function toGrams(n,u){n=parseFloat(n);u=String(u).toLowerCase();if(u==='kg')return n*1000;if(u==='gm'||u==='g')return n;if(u==='l'||u==='ltr')return n*1000;if(u==='ml')return n;return 0;}
function parseSize(name){
  var m=String(name).match(/^(.*?)[\s,]*\b(\d+(?:\.\d+)?)\s?(kg|gm|g|ml|l|ltr|pcs|pc)\b\s*$/i);
  if(m&&m[1].trim())return {base:m[1].trim(),size:(m[2]+' '+m[3]).replace(/\bg\b/,'gm'),grams:toGrams(m[2],m[3])};
  return {base:String(name).trim(),size:'',grams:0};
}
function groupProducts(list){
  var g={},order=[];
  list.forEach(function(p){var pv=parseSize(p.name);var key=(p.category||'')+'|'+pv.base.toLowerCase();
    if(!g[key]){g[key]={base:pv.base,category:p.category,variants:[],image:''};order.push(key);}
    g[key].variants.push({size:pv.size,grams:pv.grams,product:p});
    if(!g[key].image&&p.image)g[key].image=p.image;});
  return order.map(function(k){var grp=g[k];grp.variants.sort(function(a,b){return (a.grams||1e12)-(b.grams||1e12);});return grp;});
}
function variantCard(grp){
  if(grp.variants.length===1)return prodCard(grp.variants[0].product);
  var key=grp.category+'|'+grp.base.toLowerCase();
  var def=grp.variants[0],p=def.product;
  var ic=catIcon(grp.category);
  var img='<div class="img" onclick="openVariantPicker('+jk(key)+')">'+ic+(grp.image?'<img src="'+esc(grp.image)+'" loading="lazy" decoding="async" onerror="this.style.display=\'none\'">':'')+'<span class="opts">'+grp.variants.length+' sizes</span></div>';
  var unit=def.grams?('<div class="unit">'+ugx(Math.round(p.price/def.grams*1000))+' / kg</div>'):'';
  var totalInCart=grp.variants.reduce(function(s,v){return s+((CART[v.product.name]||{}).qty||0);},0);
  var ctrl=totalInCart
    ?'<button class="add" onclick="openVariantPicker('+jk(key)+')">'+totalInCart+' in cart \u00b7 Edit</button>'
    :'<button class="add opt" onclick="openVariantPicker('+jk(key)+')">Add<span>'+grp.variants.length+' options</span></button>';
  return '<div class="pc">'+img+'<div class="bd"><div class="nm">'+esc(grp.base)+'</div><div class="vsize">'+esc(def.size)+'</div><div class="pr">'+ugx(p.price)+'</div>'+unit+ctrl+'</div></div>';
}
function openVariantPicker(key){
  var grp=GROUPS[key];if(!grp)return;

  var thumb=grp.image?'<img src="'+esc(grp.image)+'" loading="lazy" decoding="async">':catIcon(grp.category);
  var rows=grp.variants.map(function(v){
    var p=v.product,c=CART[p.name];
    var unit=v.grams?(' <span class="vunit">\u00b7 '+ugx(Math.round(p.price/v.grams*1000))+'/kg</span>'):'';
    var right=c?('<div class="stp sm"><button onclick="vpStep('+jk(p.name)+','+jk(key)+',-1)">\u2212</button><span>'+c.qty+'</span><button onclick="vpStep('+jk(p.name)+','+jk(key)+',1)">+</button></div>')
      :('<button class="add sm" onclick="vpStep('+jk(p.name)+','+jk(key)+',1)">Add</button>');
    return '<div class="vrow"><div class="vth">'+thumb+'</div><div class="vmeta"><div class="vsz">'+esc(v.size)+'</div><div class="vpr">'+ugx(p.price)+unit+'</div></div>'+right+'</div>';
  }).join('');
  $('sheetBody').innerHTML='<div class="vlist">'+rows+'</div><button class="place" onclick="closeSheet()">Done</button>';
  $('sheet').classList.add('show');
}
function vpStep(name,key,d){if(d>0)cartAdd(name);else cartSub(name);openVariantPicker(key);}
function cartAdd(name){var p=prod(name);if(!p)return;if(!CART[name])CART[name]={name:p.name,price:p.price,qty:0};CART[name].qty++;saveCart();render();bar();}
function cartSub(name){if(!CART[name])return;CART[name].qty--;if(CART[name].qty<=0)delete CART[name];saveCart();render();bar();}
function vpick(key,i){VSEL[key]=i;render();}
function gridG(list){var arr=groupProducts(list);arr.forEach(function(g){GROUPS[g.category+"|"+g.base.toLowerCase()]=g;});return '<div class="grid">'+arr.map(variantCard).join('')+'</div>';}

function prodCard(p){
  var key=p.name, inCart=CART[key];

  var img='<div class="img">'+ic+(p.image?'<img src="'+esc(p.image)+'" loading="lazy" decoding="async" onerror="this.style.display=\'none\'">':'')+'</div>';
  var ctrl=inCart?('<div class="stp"><button onclick="dec('+jk(key)+')">−</button><span>'+inCart.qty+'</span><button onclick="inc('+jk(key)+')">+</button></div>'):('<button class="add" onclick="inc('+jk(key)+')">Add</button>');
  return '<div class="pc">'+img+'<div class="bd"><div class="nm">'+esc(p.name)+'</div><div class="pr">'+ugx(p.price)+'</div>'+ctrl+'</div></div>';
}
function gridHtml(items){return '<div class="grid">'+items.map(prodCard).join('')+'</div>';}

function reorderItems(items){
  var added=0,missing=0;
  (items||[]).forEach(function(it){var p=prod(it.name);if(p){if(!CART[p.name])CART[p.name]={name:p.name,price:p.price,qty:0};CART[p.name].qty+=(it.qty||1);added++;}else{missing++;}});
  saveCart();render();bar(); if(added)openCart();
  if(missing)setTimeout(function(){alert(missing+' item(s) are no longer available and were skipped.');},200);
}
/* ---- WhatsApp OTP login (cross-device) ---- */
function authBase(){return (SUBMIT_URL||'').replace(/\/order$/,'');}
function openLogin(prefill){
  $('sheetTitle').textContent='Log in';
  $('sheetBody').innerHTML=
    '<div class="field"><label>Your WhatsApp number</label><input id="loPhone" inputmode="numeric" value="'+esc(prefill||(CUST&&CUST.phone)||'')+'" placeholder="2567\u2026"></div>'+
    '<div id="loMsg" class="locmsg">We\u2019ll send a 6-digit code to this number on WhatsApp.</div>'+
    '<button class="place" id="loSendBtn" onclick="reqCode()">Send code</button>'+
    '<button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="closeSheet()">Cancel</button>';
  $('sheet').classList.add('show');
}
async function reqCode(){
  var phone=($('loPhone').value||'').replace(/[^0-9]/g,'');
  if(phone.length<9){alert('Enter a valid WhatsApp number');return;}
  var b=$('loSendBtn');b.disabled=true;b.textContent='Sending\u2026';
  try{var r=await fetch(authBase()+'/auth/request',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone})});var d=await r.json();
    if(d&&d.ok){codeStep(phone,d.sent_to);}else{alert((d&&d.error)||'Could not send code');b.disabled=false;b.textContent='Send code';}
  }catch(e){alert('Network error');b.disabled=false;b.textContent='Send code';}
}
function codeStep(phone,mask){
  $('sheetBody').innerHTML=
    '<div class="field"><label>Enter the code sent to '+esc(mask||phone)+'</label><input id="loCode" inputmode="numeric" maxlength="6" placeholder="6-digit code"></div>'+
    '<button class="place" id="loVerBtn" onclick="verifyCode('+jk(phone)+')">Verify &amp; log in</button>'+
    '<button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="openLogin('+jk(phone)+')">\u2190 Use another number</button>';
}
async function verifyCode(phone){
  var code=($('loCode').value||'').replace(/[^0-9]/g,'');
  if(code.length<4){alert('Enter the code');return;}
  var b=$('loVerBtn');b.disabled=true;b.textContent='Checking\u2026';
  try{var r=await fetch(authBase()+'/auth/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:phone,code:code})});var d=await r.json();
    if(d&&d.ok&&d.token){AUTHTOK=d.token;try{localStorage.setItem(AUTH_KEY,d.token);}catch(e){}
      var pr=d.profile||{};saveCust({name:pr.name||'',phone:pr.phone||phone,addr:pr.address||''});
      await loadMyOrders();closeSheet();render();toast('Logged in');}
    else{alert((d&&d.error)||'Wrong code');b.disabled=false;b.textContent='Verify & log in';}
  }catch(e){alert('Network error');b.disabled=false;b.textContent='Verify & log in';}
}
async function loadMyOrders(){
  if(!AUTHTOK)return;
  try{var r=await fetch(authBase()+'/account/orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:AUTHTOK})});
    if(r.status===401){logoutCust();return;}
    var d=await r.json();
    if(d&&d.ok){MYORDERS=d.orders||[];var pr=d.profile||{};if(pr.name||pr.address)saveCust({name:pr.name||(CUST&&CUST.name)||'',phone:pr.phone||(CUST&&CUST.phone)||'',addr:pr.address||(CUST&&CUST.addr)||''});
      if(MYORDERS.length&&MYORDERS[0].items&&MYORDERS[0].items.length)saveLast(MYORDERS[0].items);render();}
  }catch(e){}
}
function logoutCust(){AUTHTOK=null;MYORDERS=null;try{localStorage.removeItem(AUTH_KEY);}catch(e){}forgetCust();}
function openMyOrders(){
  if(!AUTHTOK){openLogin();return;}
  if(!MYORDERS){loadMyOrders().then(openMyOrders);return;}
  $('sheetTitle').textContent='My orders';
  if(!MYORDERS.length){$('sheetBody').innerHTML='<div class="empty">No past orders yet.</div><button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="closeSheet()">Close</button>';$('sheet').classList.add('show');return;}
  var html=MYORDERS.map(function(o,i){
    var items=(o.items||[]).map(function(it){return it.qty+'\u00D7 '+it.name;}).join(', ');
    return '<div style="border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:10px">'+
      '<div style="display:flex;justify-content:space-between"><b>'+esc(o.order_no||('Order '+(i+1)))+'</b><span style="color:var(--muted);font-size:12px">'+esc(o.status||'')+'</span></div>'+
      '<div style="font-size:12px;color:var(--muted);margin:4px 0">'+esc(items)+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:700">'+ugx(o.total||0)+'</span>'+
      '<button onclick="reorderFrom('+i+')" style="border:1px solid var(--green);background:#fff;color:var(--green-d);font-weight:700;border-radius:9px;padding:6px 12px;font-size:13px">\u21BB Reorder</button></div></div>';
  }).join('');
  $('sheetBody').innerHTML=html+'<button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="closeSheet()">Close</button>';
  $('sheet').classList.add('show');
}

function thaliBanner(){

    : '<button onclick="addThali()" style="border:0;background:#7A1F1F;color:#fff;font-weight:800;border-radius:11px;padding:11px 22px;font-size:14px;cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(122,31,31,.25)">Add \u00B7 '+ugx(THALI.price)+'</button>';
  var priceNum=ugx(THALI.price).replace(CUR+' ','');
  var pchip=THALI.price?('<div style="text-align:center;background:#F2A93B;border-radius:12px;padding:6px 12px;line-height:1.1;flex:none"><div style="font-size:9px;font-weight:800;color:#7A1F1F;letter-spacing:.5px">ONLY</div><div style="font-size:17px;font-weight:900;color:#7A1F1F">'+priceNum+'</div><div style="font-size:8px;font-weight:800;color:#7A1F1F">'+CUR+'</div></div>'):'';
  // Header strip (always): PURE VEG · day · KATHIYAWADI THALI · price
  var header='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:14px 14px 12px;background:linear-gradient(135deg,#FBEFD9,#F7E0C0)">'+
    '<div><div style="font-size:10px;font-weight:800;letter-spacing:.6px;color:#9A6A3A;margin-bottom:5px">\uD83C\uDF7D TODAY \u00B7 '+esc(THALI.day_name).toUpperCase()+'</div>'+
      '<span style="display:inline-block;background:#0C831F;color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;border-radius:999px;padding:3px 9px">PURE VEG</span>'+
      '<div style="font-weight:900;font-size:17px;color:#7A1F1F;margin-top:6px;line-height:1.1">Kathiyawadi Thali</div>'+
      (THALI.note?('<div style="font-size:11.5px;color:#9A6A3A;margin-top:3px">'+esc(THALI.note)+'</div>'):'')+
    '</div>'+pchip+'</div>';
  // Flyer image embedded when present
  var imgblock=hasImg?('<img src="'+esc(THALI.image)+'" style="width:100%;display:block;border-top:1px solid #EAD6B5" onerror="this.style.display=\'none\'">'):'';
  // Dish list only when there is no flyer (the flyer already lists the dishes)
  var dishesHtml='';
  if(!hasImg && items.length){
    var dishes=items.map(function(d,i){
      return '<div style="display:flex;gap:7px;align-items:baseline;padding:2px 0"><span style="font-weight:800;color:#C0392B;min-width:16px">'+(i+1)+'.</span><span style="color:#5a3210;font-weight:600;font-size:13px">'+esc(d)+'</span></div>';
    }).join('');
    dishesHtml='<div style="columns:2;column-gap:16px;padding:12px 14px 2px;background:linear-gradient(135deg,#FBEFD9,#F7E0C0)">'+dishes+
      '<div style="text-align:center;color:#9A6A3A;font-size:11px;font-weight:700;margin:8px 0 2px;letter-spacing:.3px;column-span:all">\u2766 A COMPLETE MEAL OF TRADITION & TASTE \u2766</div></div>';
  }
  // Footer action bar (always)
  var footer='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;background:#fff">'+
    '<div style="font-size:12px;color:#9A6A3A;font-weight:700">\uD83C\uDF3F Pure veg \u00B7 \uD83C\uDF72 Authentic \u00B7 \u2764\uFE0F Homely</div>'+btn+'</div>';
  return '<div style="border:1px solid #E9C79A;border-radius:16px;overflow:hidden;margin:0 0 16px;box-shadow:0 3px 12px rgba(122,31,31,.12)">'+header+imgblock+dishesHtml+footer+'</div>';
}

function render(){
  var c=$('content');
  if(!PRODUCTS.length){c.innerHTML='<div class="empty">Loading products…</div>';return;}
  var q=Q.trim().toLowerCase();
  if(q){
    var res=PRODUCTS.filter(function(p){return (p.name+' '+p.brand+' '+p.category+' '+p.keywords).toLowerCase().indexOf(q)>=0;});
    c.innerHTML='<div class="section-title">Results for “'+esc(Q)+'”</div>'+(res.length?gridG(res.slice(0,80)):'<div class="empty">No products match “'+esc(Q)+'”.</div>');
    return;
  }
  if(CAT==='all'){
    c.innerHTML=welcomeBanner()+thaliBanner()+'<div class="section-title">Shop by category</div><div class="catgrid">'+CATS.map(function(cat,i){
      var ci=CAT_IMG[cat.name];
      var inner=ci?('<div class="ci" style="background:#fff"><img src="'+esc(ci)+'" onerror="this.style.display=\'none\'"></div>')
                  :('<div class="ci" style="background:'+TINTS[i%TINTS.length]+'">'+catIcon(cat.name)+'</div>');
      return '<button class="cat" onclick="setCat('+jk(cat.name)+')">'+inner+'<div class="nm">'+esc(cat.name)+'</div></button>';
    }).join('')+'</div>';
    return;
  }
  var list=PRODUCTS.filter(function(p){return p.category===CAT;});
  var tb=(String(CAT).toLowerCase().indexOf('thali')>=0)?thaliBanner():'';
  c.innerHTML=tb+'<div class="backbar"><button onclick="setCat(\'all\')">‹ Categories</button><b>'+esc(CAT)+'</b></div>'+
    '<div class="meta">'+groupProducts(list).length+' item'+(groupProducts(list).length===1?'':'s')+'</div>'+gridG(list.slice(0,150));
}

function prod(key){return PRODUCTS.find(function(p){return p.name===key;});}
function inc(key){var p=prod(key);if(!p)return;if(!CART[key])CART[key]={name:p.name,price:p.price,qty:0};CART[key].qty++;saveCart();render();bar();if($('sheet').classList.contains('show'))openCart();}
function dec(key){if(!CART[key])return;CART[key].qty--;if(CART[key].qty<=0)delete CART[key];saveCart();render();bar();if($('sheet').classList.contains('show'))openCart();}
function cartItems(){return Object.keys(CART).map(function(k){return CART[k];});}
function cartCount(){return cartItems().reduce(function(s,i){return s+i.qty;},0);}
function cartTotal(){return cartItems().reduce(function(s,i){return s+i.price*i.qty;},0);}
function bar(){var n=cartCount();$('cartbar').classList.toggle('show',n>0);$('cartCount').textContent=n+(n===1?' item':' items');$('cartTotal').textContent=ugx(cartTotal());}
function saveCart(){try{localStorage.setItem(STORE_KEY,JSON.stringify(CART));}catch(e){}}
function loadCart(){try{CART=JSON.parse(localStorage.getItem(STORE_KEY)||'{}')||{};}catch(e){CART={};}}

function closeSheet(){$('sheet').classList.remove('show');}
function openCart(){
  $('sheetTitle').textContent='Your cart';
  var items=cartItems();
  if(!items.length){$('sheetBody').innerHTML='<div class="empty">Your cart is empty.</div>';$('sheet').classList.add('show');return;}
  var rows=items.map(function(i){var k=jk(i.name);
    return '<div class="ci2"><div><div class="nm">'+esc(i.name)+'</div><div class="pr">'+ugx(i.price)+' each</div></div>'+
      '<div class="stp"><button onclick="dec('+k+')">−</button><span>'+i.qty+'</span><button onclick="inc('+k+')">+</button></div></div>';}).join('');
  $('sheetBody').innerHTML=rows+'<div style="padding:10px 0"><div class="totrow g"><span>Total</span><span>'+ugx(cartTotal())+'</span></div>'+
    '<div class="note">Delivery fee is added by our team based on your location.</div>'+
    '<button class="place" onclick="openCheckout()">Checkout →</button></div>';
  $('sheet').classList.add('show');
}
function openCheckout(){
  $('sheetTitle').textContent='Delivery details';
  $('sheetBody').innerHTML=
    '<div class="field"><label>Your name</label><input id="coName" value="'+esc((CUST&&CUST.name)||qp('n'))+'" placeholder="Full name"></div>'+
    '<div class="field"><label>WhatsApp number</label><input id="coPhone" inputmode="numeric" value="'+esc((CUST&&CUST.phone)||qp('c'))+'" placeholder="2567…"></div>'+
    '<div class="field"><label>Delivery address</label><textarea id="coAddr" rows="2" placeholder="Area, road, landmark">'+esc((CUST&&CUST.addr)||'')+'</textarea></div>'+
    '<div class="field"><label>Special instructions <span style="color:#98a2b3;font-weight:400">(optional)</span></label><textarea id="coNote" rows="2" placeholder="e.g. in the thali remove dal &amp; add kadhi \u00B7 less spicy \u00B7 leave at gate"></textarea></div>'+
    '<div class="field"><label>Delivery location (GPS pin)</label>'+
    '<button type="button" class="locbtn" id="locBtn" onclick="captureLoc()">📍 Share my current location</button>'+
    '<div id="locMsg" class="locmsg">Optional — sends an exact map pin so the rider finds you fast.</div></div>'+
    '<div class="field"><label>Payment</label><select id="coPay"><option>Cash on delivery</option><option>Mobile money</option></select></div>'+
    '<div class="field"><label>Schedule for later <span style="color:#98a2b3;font-weight:400">(optional — leave blank to deliver now)</span></label><input id="coWhen" type="datetime-local"></div>'+
    '<div class="totrow g"><span>Total ('+cartCount()+' items)</span><span>'+ugx(cartTotal())+'</span></div>'+
    '<button class="place" id="placeBtn" onclick="placeOrder()">Place order</button>'+
    '<button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="openCart()">← Back to cart</button>';
  renderLocMsg();
}
function mapsUrl(g){return 'https://maps.google.com/?q='+g.lat+','+g.lng;}
function renderLocMsg(){
  var m=$('locMsg'),b=$('locBtn');if(!m)return;
  if(GEO){m.innerHTML='✓ Location captured — <a href="'+mapsUrl(GEO)+'" target="_blank" rel="noopener">view pin</a>';m.className='locmsg ok';if(b)b.textContent='📍 Update my location';}
  else{m.textContent='Optional — sends an exact map pin so the rider finds you fast.';m.className='locmsg';if(b)b.textContent='📍 Share my current location';}
}
function captureLoc(){
  if(!navigator.geolocation){alert('Location isn’t available on this device — please type your address/landmark.');return;}
  var b=$('locBtn');if(b){b.disabled=true;b.textContent='Detecting…';}
  navigator.geolocation.getCurrentPosition(
    function(p){GEO={lat:+p.coords.latitude.toFixed(6),lng:+p.coords.longitude.toFixed(6)};if(b)b.disabled=false;renderLocMsg();},
    function(){if(b)b.disabled=false;renderLocMsg();alert('Couldn’t get your location. Please allow location access, or type your address/landmark.');},
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000}
  );
}
async function placeOrder(){
  var name=($('coName').value||'').trim(), phone=($('coPhone').value||'').replace(/[^0-9]/g,''), addr=($('coAddr').value||'').trim(), pay=$('coPay').value, note=(($('coNote')||{}).value||'').trim(), when=(($('coWhen')||{}).value||'').trim();
  if(!name){alert('Please enter your name');return;}
  if(phone.length<7){alert('Please enter your WhatsApp number');return;}
  if(!addr && !GEO){alert('Please enter your delivery address or share your location');return;}
  var payload={name:name,phone:phone,location:addr,payment:pay,note:note,when:when,items:cartItems().map(function(i){return {name:i.name,price:i.price,qty:i.qty};}),total:cartTotal(),channel:'web'};
  if(GEO){payload.geo=GEO.lat+','+GEO.lng;payload.maps_url=mapsUrl(GEO);}
  var btn=$('placeBtn');btn.disabled=true;btn.textContent='Placing…';
  try{
    var r=await fetch(SUBMIT_URL,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});
    var d=await r.json();
    if(d&&d.ok){saveCust({name:name,phone:phone,addr:addr});saveLast(payload.items);CART={};saveCart();bar();render();$('sheetTitle').textContent='Order placed';
      var shopName=SHOP.name||'us';
      $('sheetBody').innerHTML='<div class="ok"><div class="big">🙏</div><h2>Order placed!</h2><p>Tap below to confirm your order on WhatsApp — our team will arrange delivery.</p>'+
        (d.order_no?'<div class="ono">'+esc(d.order_no)+'</div>':'')+'<div style="margin-top:18px">'+
        (WA_NUMBER?'<a class="place" style="display:block;text-decoration:none;text-align:center" href="https://wa.me/'+WA_NUMBER+'?text='+encodeURIComponent('Hi '+shopName+', I just placed order '+(d.order_no||'')+' on the website. Please confirm and arrange delivery.')+'">Confirm on WhatsApp</a>':'')+
        (d.track_url?'<a class="place" style="display:block;text-decoration:none;text-align:center;background:#fff;color:var(--green-d);border:1px solid var(--line)" href="'+esc(d.track_url)+'">Track my order</a>':'')+
        '<button class="place" style="background:#fff;color:var(--green-d);border:1px solid var(--line)" onclick="closeSheet()">Done</button></div></div>';
    }else{alert((d&&d.error)?d.error:'Could not place order. Please try again.');btn.disabled=false;btn.textContent='Place order';}
  }catch(e){alert('Network error — please try again.');btn.disabled=false;btn.textContent='Place order';}
}

/* ---- brand the shell from the injected config ---- */
(function brand(){
  document.title=(SHOP.name||'Shop')+' — Shop';
  var hb=document.querySelector('.top b'); if(hb)hb.textContent=SHOP.name||'Shop';
  var lg=document.querySelector('.top .lg'); if(lg){ if(SHOP.logo){lg.innerHTML='<img src="'+esc(SHOP.logo)+'" style="width:100%;height:100%;object-fit:cover">';lg.style.background='#fff';} else {lg.textContent=SHOP.initials||'SH';} }
  var fn=$('footName'); if(fn)fn.textContent=(SHOP.name||'Shop')+(SHOP.city?(' · '+SHOP.city):'');
  var sl=$('staffLink'); if(sl)sl.href=ADMIN_URL;
})();

$('q').addEventListener('input',function(){Q=this.value;render();});
loadCart(); loadCust(); bar(); restoreDelv(); load();
</script>
