# One-click full stack. On EasyPanel you can instead deploy just the `app`
# service and point DB_HOST/REDIS_HOST at EasyPanel's managed Postgres/Redis.
services:
  app:
    build: .
    restart: unless-stopped
    ports: ["8080:80"]
    env_file: .env
    depends_on: [pgsql, redis]

  pgsql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-shopbot}
      POSTGRES_USER: ${DB_USERNAME:-shopbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes: ["redisdata:/data"]

volumes:
  pgdata:
  redisdata:
