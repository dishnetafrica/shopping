<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>OEE Dashboard — Win World</title>
<style>
  :root{--ink:#16202B;--steel:#5C6B7A;--line:#E2E7EC;--bg:#F4F6F8;--card:#fff;--amber:#D9821E;--green:#2E7D55;--blue:#3B5BA9;--red:#B4232A}
  *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:5;background:var(--ink);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  header h1{font-size:16px;margin:0;font-weight:600}
  .bar{display:flex;gap:6px;align-items:center}
  .bar button{background:#26323f;color:#cfd6dd;border:1px solid #3a4855;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer}
  .bar button.on{background:var(--amber);color:#fff;border-color:var(--amber)}
  .wrap{max-width:980px;margin:0 auto;padding:16px}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px}
  .kpi .n{font-size:24px;font-weight:700}
  .kpi .l{font-size:11px;color:var(--steel);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .kpi .sub{font-size:11px;color:var(--steel);margin-top:4px}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .sec h2{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--steel);margin:0 0 12px}
  .sec h2 .hint{text-transform:none;letter-spacing:0;color:var(--steel);font-weight:400}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:0}
  .mrow .mc{width:78px;font-weight:600}
  .mrow .mc .p{font-size:10px;color:var(--steel);font-weight:400}
  .oeebig{width:64px;text-align:right;font-size:20px;font-weight:700}
  .apq{flex:1;display:flex;gap:10px}
  .apq .b{flex:1}
  .apq .b .lbl{font-size:10px;color:var(--steel);display:flex;justify-content:space-between}
  .track{height:7px;background:#eef1f4;border-radius:4px;overflow:hidden;margin-top:3px}
  .track i{display:block;height:100%;border-radius:4px}
  .mstat{font-size:11px;color:var(--steel);width:120px;text-align:right}
  .pareto .pr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .pareto .pr .rn{width:140px;font-size:13px}
  .pareto .pr .bar{flex:1;height:18px;background:#fbecec;border-radius:5px;overflow:hidden}
  .pareto .pr .bar i{display:block;height:100%;background:var(--red)}
  .pareto .pr .hv{width:90px;text-align:right;font-size:12px;color:var(--steel)}
  table.board{width:100%;border-collapse:collapse;font-size:13px}
  table.board th{text-align:left;font-size:11px;color:var(--steel);font-weight:500;padding:6px 4px;border-bottom:1px solid var(--line)}
  table.board td{padding:8px 4px;border-bottom:1px solid var(--line)}
  .util{display:inline-block;width:90px;height:7px;background:#eef1f4;border-radius:4px;overflow:hidden;vertical-align:middle}
  .util i{display:block;height:100%;background:var(--blue)}
  .muted{color:var(--steel);text-align:center;padding:22px}
  .pn{font-family:ui-monospace,monospace}
  @media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.mrow .mstat{display:none}}
</style>
</head>
<body>
<header>
  <h1>OEE Dashboard <span class="hint" style="color:#aab4bd;font-weight:400">· {{WW_TENANT}}</span></h1>
  <div class="bar">
    <button data-d="7">7d</button><button data-d="30" class="on">30d</button><button data-d="0">All</button>
    <a href="/panel/planning" style="color:#aab4bd;font-size:13px;text-decoration:none;margin-left:6px">Planning ›</a>
  </div>
</header>
<div class="wrap" id="root"><div class="muted">Loading…</div></div>

<script>
"use strict";
var DAYS=30;
function api(p,q){var qs=q?"?"+Object.keys(q).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(q[k]==null?"":q[k]);}).join("&"):"";
  return fetch("/papi/"+p+qs,{headers:{Accept:"application/json"},credentials:"same-origin"}).then(function(r){return r.json();});}
function esc(s){return (s==null?"":String(s)).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function pct(x){return Math.round((x||0)*100);}
function colorFor(o){return o>=0.85?"var(--green)":o>=0.6?"var(--amber)":"var(--red)";}

function bar(label,val){
  return '<div class="b"><div class="lbl"><span>'+label+'</span><span>'+pct(val)+'%</span></div>'+
    '<div class="track"><i style="width:'+pct(val)+'%;background:'+colorFor(val)+'"></i></div></div>';
}
function render(d){
  var s=d.summary, root=document.getElementById("root");
  var avgOee = d.per_machine.length ? d.per_machine.reduce(function(a,m){return a+m.oee;},0)/d.per_machine.length : 0;
  var kpis='<div class="kpis">'+
    '<div class="kpi"><div class="n" style="color:'+colorFor(avgOee)+'">'+pct(avgOee)+'%</div><div class="l">Avg OEE</div><div class="sub">'+d.per_machine.length+' machines run</div></div>'+
    '<div class="kpi"><div class="n">'+s.produced_kg+'</div><div class="l">Produced kg</div><div class="sub">of '+s.order_kg+' kg ordered</div></div>'+
    '<div class="kpi"><div class="n">'+s.first_pass_yield+'%</div><div class="l">First-pass yield</div><div class="sub">'+s.scrap_kg+' kg scrap</div></div>'+
    '<div class="kpi"><div class="n" style="color:'+colorFor((d.yield&&d.yield.yield_pct/100)||0)+'">'+((d.yield&&d.yield.yield_pct)||0)+'%</div><div class="l">Material yield</div><div class="sub">'+((d.yield&&d.yield.regrind_kg)||0)+' kg regrind · '+(s.changeover_hours||0)+' h changeover</div></div>'+
    '<div class="kpi"><div class="n">'+s.avg_efficiency_pct+'%</div><div class="l">Avg efficiency</div><div class="sub">actual ÷ target</div></div>'+
    '<div class="kpi"><div class="n">'+(s.by_status["In Process"]+s.by_status["Planned"])+'</div><div class="l">Active orders</div>'+
      '<div class="sub">'+s.by_status["Completed"]+' done · '+s.by_status["Open"]+' open</div></div>'+
    '</div>';

  // per-machine OEE (worst first)
  var mach = d.per_machine.length ? d.per_machine.map(function(m){
    return '<div class="mrow">'+
      '<div class="mc">'+esc(m.machine)+'<div class="p">'+esc(m.process)+'</div></div>'+
      '<div class="oeebig" style="color:'+colorFor(m.oee)+'">'+pct(m.oee)+'%</div>'+
      '<div class="apq">'+bar("Avail"+(m.has_plan?"":"*"),m.availability)+bar("Perf",m.performance)+bar("Qual",m.quality)+'</div>'+
      '<div class="mstat">'+m.produced_kg+' kg · '+m.run_hours+' h</div>'+
    '</div>';
  }).join("") : '<div class="muted">No production recorded yet in this period.</div>';
  var machSec='<div class="sec"><h2>Machine OEE <span class="hint">— worst first, act here. *availability approximate where no plan hours.</span></h2>'+mach+'</div>';

  // downtime pareto
  var maxH = d.downtime.reduce(function(a,r){return Math.max(a,r.hours);},0)||1;
  var par = d.downtime.length ? d.downtime.map(function(r){
    return '<div class="pr"><div class="rn">'+esc(r.reason)+'</div>'+
      '<div class="bar"><i style="width:'+Math.round(r.hours/maxH*100)+'%"></i></div>'+
      '<div class="hv">'+r.hours+' h · '+r.count+'×</div></div>';
  }).join("") : '<div class="muted">No downtime logged. 👍</div>';
  var parSec='<div class="sec pareto"><h2>Downtime — by reason <span class="hint">(attack the top bar first)</span></h2>'+par+'</div>';

  // machine board
  var byId={}; d.machines.forEach(function(m){byId[m.id]=m;});
  var rows=(d.machine_board||[]).map(function(b){
    var m=byId[b.machine_id]||{}; var u=Math.min(100,Math.round((b.booked_hours_7d/(d.weekly_capacity_hrs||84))*100));
    return '<tr><td>'+esc(m.machine||("#"+b.machine_id))+'</td><td>'+esc(m.process||"")+'</td>'+
      '<td class="pn">'+(b.next_available||"free")+'</td>'+
      '<td>'+b.booked_hours_7d+' h</td>'+
      '<td><span class="util"><i style="width:'+u+'%"></i></span> '+u+'%</td></tr>';
  }).join("");
  var board='<div class="sec"><h2>Machine board <span class="hint">— next 7 days vs '+(d.weekly_capacity_hrs||84)+'h capacity</span></h2>'+
    (rows? '<table class="board"><thead><tr><th>Machine</th><th>Process</th><th>Next available</th><th>Booked 7d</th><th>Utilisation</th></tr></thead><tbody>'+rows+'</tbody></table>'
         : '<div class="muted">Nothing planned yet.</div>')+'</div>';

  // response KPIs (maintenance) — diagnosis next to response
  var mt=(d.maint||{}); var mttr=mt.mttr||{}, mtbf=mt.mtbf||{}, pm=mt.pm||{};
  var pmCol = pm.pct>=90?'var(--green)':(pm.pct>=70?'#D9821E':'#B4232A');
  var respSec='<div class="sec"><h2>Response <span class="hint">— how fast you fix what OEE flags. <a href="/panel/maintenance" style="color:#3B5BA9;text-decoration:none">Maintenance log ›</a></span></h2>'+
    '<div class="kpis" style="grid-template-columns:repeat(4,1fr)">'+
    '<div class="kpi"><div class="n">'+(mttr.hours||0)+' h</div><div class="l">MTTR</div><div class="sub">'+(mttr.count||0)+' fixes</div></div>'+
    '<div class="kpi"><div class="n">'+(mtbf.hours||0)+' h</div><div class="l">MTBF</div><div class="sub">'+(mtbf.failures||0)+' failures</div></div>'+
    '<div class="kpi"><div class="n" style="color:'+pmCol+'">'+(pm.pct||0)+'%</div><div class="l">PM compliance</div><div class="sub">'+(pm.on_time||0)+'/'+(pm.due||0)+' on time</div></div>'+
    '<div class="kpi"><div class="n">'+(mt.open||0)+'</div><div class="l">Open work orders</div><div class="sub">'+(mt.breakdowns||0)+' breakdowns</div></div>'+
    '</div></div>';
  root.innerHTML=kpis+respSec+machSec+parSec+board;
}
function load(){
  document.getElementById("root").innerHTML='<div class="muted">Loading…</div>';
  api("ww-dashboard",{days:DAYS}).then(function(r){ if(r&&r.ok) render(r); else document.getElementById("root").innerHTML='<div class="muted">Could not load.</div>'; });
}
Array.prototype.forEach.call(document.querySelectorAll(".bar button[data-d]"),function(b){
  b.onclick=function(){ DAYS=parseInt(b.getAttribute("data-d"),10);
    Array.prototype.forEach.call(document.querySelectorAll(".bar button[data-d]"),function(x){x.classList.remove("on");});
    b.classList.add("on"); load(); };
});
load();
</script>
</body>
</html>
